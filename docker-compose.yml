x-service-defaults: &service-defaults
  image: python:3.12-alpine
  command:
    - sh
    - -c
    - |
      python - <<'PY'
      import os
      from datetime import datetime, timezone
      from http.server import BaseHTTPRequestHandler, HTTPServer

      service_name = os.environ["SERVICE_NAME"]
      shared_dir = "/shared"
      os.makedirs(shared_dir, exist_ok=True)
      health_file = os.path.join(shared_dir, f"{service_name}.health")

      class Handler(BaseHTTPRequestHandler):
          def do_GET(self):
              if self.path != "/health":
                  self.send_response(404)
                  self.end_headers()
                  return

              with open(health_file, "w", encoding="utf-8") as file:
                  file.write(datetime.now(timezone.utc).isoformat())

              body = f"{service_name}:ok\n".encode("utf-8")
              self.send_response(200)
              self.send_header("Content-Type", "text/plain; charset=utf-8")
              self.send_header("Content-Length", str(len(body)))
              self.end_headers()
              self.wfile.write(body)

          def log_message(self, format, *args):
              return

      HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
      PY
  healthcheck:
    test:
      - CMD-SHELL
      - python -c "import sys, urllib.request; response = urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2); sys.exit(0 if response.status == 200 else 1)"
    interval: 10s
    timeout: 3s
    retries: 5
    start_period: 5s
  networks:
    - workforce-os
  volumes:
    - workforce-os-shared-data:/shared

services:
  identity-service:
    <<: *service-defaults
    environment:
      SERVICE_NAME: identity-service

  employee-registry:
    <<: *service-defaults
    environment:
      SERVICE_NAME: employee-registry

  runtime:
    <<: *service-defaults
    environment:
      SERVICE_NAME: runtime

  capability-gateway:
    <<: *service-defaults
    environment:
      SERVICE_NAME: capability-gateway

  capability-registry:
    <<: *service-defaults
    environment:
      SERVICE_NAME: capability-registry

  audit-service:
    <<: *service-defaults
    environment:
      SERVICE_NAME: audit-service

networks:
  workforce-os:
    driver: bridge

volumes:
  workforce-os-shared-data:
