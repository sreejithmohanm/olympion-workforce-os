x-service-defaults: &service-defaults
  image: python:3.12-alpine
  command:
    - sh
    - -c
    - |
      mkdir -p "/shared/$${SERVICE_NAME}"
      printf 'ok\n' > "/shared/$${SERVICE_NAME}/health"
      python -m http.server 8080 --directory "/shared/$${SERVICE_NAME}"
  healthcheck:
    test:
      - CMD-SHELL
      - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"
    interval: 10s
    timeout: 3s
    retries: 5
    start_period: 5s
  networks:
    - workforce-os
  volumes:
    - workforce-os-shared-data:/shared

services:
  identity-service:
    <<: *service-defaults
    environment:
      SERVICE_NAME: identity-service

  employee-registry:
    <<: *service-defaults
    environment:
      SERVICE_NAME: employee-registry

  runtime:
    <<: *service-defaults
    environment:
      SERVICE_NAME: runtime

  capability-gateway:
    <<: *service-defaults
    environment:
      SERVICE_NAME: capability-gateway

  capability-registry:
    <<: *service-defaults
    environment:
      SERVICE_NAME: capability-registry

  audit-service:
    <<: *service-defaults
    environment:
      SERVICE_NAME: audit-service

networks:
  workforce-os:
    driver: bridge

volumes:
  workforce-os-shared-data:
